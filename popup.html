<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 420px;
      max-height: 560px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
      overflow-y: auto;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #e5e5e5;
    }
    .topbar h1 { font-size: 15px; font-weight: 600; }
    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 99px;
      background: #f0f0f0;
      color: #666;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    #setup { padding: 24px 16px; text-align: center; }
    #setup p { color: #666; margin-bottom: 12px; font-size: 13px; line-height: 1.5; }
    #setup input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 8px;
      outline: none;
    }
    #setup input:focus { border-color: #7c5cfc; }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #7c5cfc; color: #fff; }
    .btn-ghost { background: none; color: #7c5cfc; margin-top: 4px; }
    #loading { display: none; padding: 48px 16px; text-align: center; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #eee;
      border-top-color: #7c5cfc;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: #888; font-size: 13px; }
    #summary { display: none; padding: 4px 0; }
    .page-title {
      padding: 12px 16px 4px;
      font-size: 11px;
      color: #999;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .section { padding: 10px 16px; border-bottom: 1px solid #f0f0f0; }
    .section:last-child { border-bottom: none; }
    .section h3 {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #7c5cfc;
      margin-bottom: 6px;
    }
    .section p { font-size: 13px; line-height: 1.6; color: #333; }
    .actions {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      border-top: 1px solid #e5e5e5;
    }
    .actions .btn { font-size: 12px; padding: 8px; }
    #error { display: none; padding: 24px 16px; text-align: center; }
    #error p { color: #d44; font-size: 13px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>&#9889; Summarizer</h1>
    <span class="badge" id="typeBadge" style="display:none;"></span>
  </div>

  <div id="setup">
    <p>Enter your Anthropic API key to get started. Stored locally only.</p>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-..." />
    <button class="btn btn-primary" id="saveKeyBtn">Save &amp; Summarize</button>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p>Reading &amp; summarizing...</p>
  </div>

  <div id="summary">
    <div class="page-title" id="pageTitle"></div>
    <div id="sections"></div>
    <div class="actions">
      <button class="btn btn-primary" id="copyBtn">Copy Summary</button>
      <button class="btn btn-ghost" id="resummarizeBtn">Re-summarize</button>
    </div>
  </div>

  <div id="error">
    <p id="errorMsg"></p>
    <button class="btn btn-primary" id="retryBtn" style="margin-top:12px;">Retry</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
