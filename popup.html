<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      width: 420px;
      min-height: 200px;
      max-height: 600px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
      overflow-y: auto;
    }

    /* --- Header --- */
    .header {
      padding: 14px 16px;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .header-actions {
      display: flex;
      gap: 8px;
    }
    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      color: #666;
      font-size: 16px;
    }
    .icon-btn:hover { background: #f0f0f0; color: #1a1a1a; }

    /* --- API Key Setup --- */
    #setup {
      padding: 24px 16px;
      text-align: center;
    }
    #setup p {
      color: #666;
      margin-bottom: 12px;
      font-size: 13px;
      line-height: 1.5;
    }
    #setup input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      font-family: monospace;
      margin-bottom: 10px;
      outline: none;
    }
    #setup input:focus { border-color: #7c3aed; }
    
    .btn {
      display: inline-block;
      padding: 10px 20px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
    }
    .btn:hover { background: #6d28d9; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }

    /* --- Loading --- */
    #loading {
      padding: 40px 16px;
      text-align: center;
      display: none;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #e5e5e5;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: #999; font-size: 13px; }

    /* --- Summary Result --- */
    #result {
      padding: 16px;
      display: none;
    }
    .content-type {
      display: inline-block;
      padding: 3px 10px;
      background: #f3e8ff;
      color: #7c3aed;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }
    .page-title {
      font-size: 13px;
      color: #999;
      margin-bottom: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .section { margin-bottom: 14px; }
    .section h2 {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #7c3aed;
      margin-bottom: 4px;
    }
    .section p {
      font-size: 13px;
      line-height: 1.6;
      color: #333;
    }
    .result-footer {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .meta {
      font-size: 11px;
      color: #bbb;
    }
    .copy-btn {
      padding: 6px 14px;
      background: #f5f5f5;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      color: #555;
    }
    .copy-btn:hover { background: #eee; }

    /* --- Error --- */
    #error {
      padding: 24px 16px;
      text-align: center;
      display: none;
    }
    #error p { color: #e11d48; font-size: 13px; margin-bottom: 12px; }
  </style>
</head>
<body>

  <div class="header">
    <h1>⚡ Summarizer</h1>
    <div class="header-actions">
      <button class="icon-btn" id="settingsBtn" title="Settings">⚙️</button>
    </div>
  </div>

  <!-- API Key Setup -->
  <div id="setup">
    <p>Enter your Anthropic API key to get started. Your key stays local — never sent anywhere except Anthropic's API.</p>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-...">
    <button class="btn" id="saveKeyBtn">Save & Summarize</button>
  </div>

  <!-- Loading State -->
  <div id="loading">
    <div class="spinner"></div>
    <p>Reading & summarizing...</p>
  </div>

  <!-- Summary Result -->
  <div id="result">
    <div class="page-title" id="pageTitle"></div>
    <div id="summaryContent"></div>
    <div class="result-footer">
      <span class="meta" id="metaInfo"></span>
      <button class="copy-btn" id="copyBtn">📋 Copy</button>
    </div>
  </div>

  <!-- Error State -->
  <div id="error">
    <p id="errorMsg"></p>
    <button class="btn" id="retryBtn">Retry</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
